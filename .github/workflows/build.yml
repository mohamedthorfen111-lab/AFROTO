name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            kivy/buildozer \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostArchitect-APK
          path: bin/*.apk
