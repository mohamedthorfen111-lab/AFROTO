name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev \
            libffi-dev libssl-dev

      - name: Accept Android licenses
        run: |
          yes | sudo /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --licenses || true
          sudo /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;34.0.0" "platforms;android-33" \
            "platform-tools" || true

      - name: Install Python dependencies
        run: pip install buildozer cython

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostArchitect-APK
          path: bin/*.apk
